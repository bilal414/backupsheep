# DigitalOcean App Platform template used by the "Deploy to DigitalOcean" button.
# App Platform injects the database and app-domain bindable variables at runtime.
spec:
  name: backupsheep
  region: nyc
  alerts:
    - rule: DEPLOYMENT_FAILED

  # Shared runtime configuration for the web app, Celery worker, Beat, migration job,
  # and internal RabbitMQ service. Replace the three SECRET placeholder values in the
  # deployment form with unique random values before creating the app.
  envs:
    - key: DJANGO_SERVER
      value: prod
      scope: RUN_TIME
    - key: DJANGO_DEBUG
      value: "false"
      scope: RUN_TIME
    - key: DJANGO_HTTPS
      value: "true"
      scope: RUN_TIME
    - key: DJANGO_ALLOWED_HOSTS
      value: ${APP_DOMAIN}
      scope: RUN_TIME
    - key: DJANGO_SECRET_KEY
      value: replace-with-a-unique-long-random-django-secret
      scope: RUN_TIME
      type: SECRET
    - key: ONBOARDING_INSTALL_TOKEN
      value: replace-with-a-unique-random-onboarding-token
      scope: RUN_TIME
      type: SECRET
    - key: APP_NAME
      value: BackupSheep
      scope: RUN_TIME
    - key: APP_DOMAIN
      value: ${APP_DOMAIN}
      scope: RUN_TIME
    - key: APP_PROTOCOL
      value: "https://"
      scope: RUN_TIME
    - key: DB_NAME
      value: ${backupsheep-db.DATABASE}
      scope: RUN_TIME
    - key: DB_USER
      value: ${backupsheep-db.USERNAME}
      scope: RUN_TIME
    - key: DB_PASSWORD
      value: ${backupsheep-db.PASSWORD}
      scope: RUN_TIME
    - key: DB_HOST
      value: ${backupsheep-db.HOSTNAME}
      scope: RUN_TIME
    - key: DB_PORT
      value: ${backupsheep-db.PORT}
      scope: RUN_TIME
    - key: DB_SSLMODE
      value: require
      scope: RUN_TIME
    # RabbitMQ is an internal App Platform service. The application derives its AMQP
    # URL from these values, so the password is only entered once in the deploy form.
    - key: RABBITMQ_HOST
      value: rabbitmq
      scope: RUN_TIME
    - key: RABBITMQ_PORT
      value: "5672"
      scope: RUN_TIME
    - key: RABBITMQ_DEFAULT_USER
      value: backupsheep
      scope: RUN_TIME
    - key: RABBITMQ_DEFAULT_PASS
      value: replace-with-a-unique-random-rabbitmq-password
      scope: RUN_TIME
      type: SECRET

  services:
    - name: web
      git:
        repo_clone_url: https://github.com/bilal414/backupsheep.git
        branch: main
      dockerfile_path: Dockerfile
      http_port: 8000
      instance_count: 1
      instance_size_slug: apps-s-1vcpu-1gb
      health_check:
        initial_delay_seconds: 60
        period_seconds: 15
        timeout_seconds: 5
        failure_threshold: 10
        port: 8000

    # RabbitMQ receives Celery messages only over App Platform's private network.
    - name: rabbitmq
      image:
        registry_type: DOCKER_HUB
        registry: registry.hub.docker.com
        repository: library/rabbitmq
        tag: 3-management
      internal_ports:
        - 5672
      instance_count: 1
      instance_size_slug: basic-xxs

  workers:
    # App Platform does not offer a shared writable volume. A single worker therefore
    # consumes every queue so dump and upload tasks use the same temporary filesystem.
    - name: backup-worker
      git:
        repo_clone_url: https://github.com/bilal414/backupsheep.git
        branch: main
      dockerfile_path: Dockerfile
      run_command: >-
        celery -A backupsheep worker --loglevel=info --hostname=backup@%h
        -Q cloud,default,database,files,storage,logs --concurrency=1
      instance_count: 1
      instance_size_slug: apps-s-1vcpu-1gb

    - name: scheduler
      git:
        repo_clone_url: https://github.com/bilal414/backupsheep.git
        branch: main
      dockerfile_path: Dockerfile
      run_command: celery -A backupsheep beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
      instance_count: 1
      instance_size_slug: basic-xxs

  jobs:
    - name: migrate
      kind: PRE_DEPLOY
      git:
        repo_clone_url: https://github.com/bilal414/backupsheep.git
        branch: main
      dockerfile_path: Dockerfile
      run_command: python manage.py migrate --noinput
      instance_size_slug: basic-xxs

  # Deploy buttons can provision a Dev Database. Upgrade it to a managed PostgreSQL
  # cluster in App Platform before relying on the installation for production backups.
  databases:
    - name: backupsheep-db
      engine: PG
      production: false
