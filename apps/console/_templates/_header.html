<div x-data="headerNav"
     class="sticky top-0 z-40 flex h-16 shrink-0 items-center gap-x-4 border-b border-slate-200 bg-white/80 backdrop-blur-md px-4 sm:gap-x-6 sm:px-6 lg:px-10">
    <button @click="sideBar = ! sideBar" type="button" class="-m-2.5 p-2.5 text-slate-600 lg:hidden">
        <span class="sr-only">Open sidebar</span>
        <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"
             aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round"
                  d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"></path>
        </svg>
    </button>

    <div class="h-6 w-px bg-slate-900/10 lg:hidden" aria-hidden="true"></div>

    <div class="flex flex-1 gap-x-4 self-stretch lg:gap-x-6 justify-end">
        <div class="flex items-center gap-x-4 lg:gap-x-6 ">

            <!-- Profile dropdown -->
            <div class="relative" x-data="{ isOpen: false }">
                <button @click="isOpen = ! isOpen" type="button"
                        class="flex items-center gap-x-2.5 rounded-full py-1 pl-1 pr-2.5 hover:bg-slate-100 transition-colors"
                        id="user-menu-button"
                        aria-expanded="false" aria-haspopup="true">
                    <span class="sr-only">Open user menu</span>
                    <span class="flex h-8 w-8 items-center justify-center rounded-full bg-gradient-to-br from-indigo-500 to-indigo-700 text-sm font-semibold text-white shadow-sm">
                        {{ request.user.member.full_name|slice:":1"|upper }}
                    </span>
                    <span class="hidden lg:flex lg:items-center">
                        <span class="text-sm font-medium leading-6 text-slate-700"
                              aria-hidden="true">{{ request.user.member.full_name }}</span>
                        <svg class="ml-1.5 h-4 w-4 text-slate-400" viewBox="0 0 20 20" fill="currentColor"
                             aria-hidden="true">
                            <path fill-rule="evenodd"
                                  d="M5.23 7.21a.75.75 0 011.06.02L10 11.168l3.71-3.938a.75.75 0 111.08 1.04l-4.25 4.5a.75.75 0 01-1.08 0l-4.25-4.5a.75.75 0 01.02-1.06z"
                                  clip-rule="evenodd"></path>
                        </svg>
                    </span>
                </button>

                <div x-show="isOpen"
                     x-transition:enter="transition ease-out duration-100"
                     x-transition:enter-start="transform opacity-0 scale-95"
                     x-transition:enter-end="transform opacity-100 scale-10"
                     x-transition:leave="transition ease-in duration-75"
                     x-transition:leave-start="transform opacity-100 scale-100"
                     x-transition:leave-end="transform opacity-0 scale-95"
                     @click.away="isOpen = false"
                     style="display: none;"
                     class="absolute right-0 z-10 mt-2 w-52 origin-top-right rounded-xl bg-white py-1.5 shadow-lifted ring-1 ring-slate-900/5 focus:outline-hidden"
                     role="menu" aria-orientation="vertical" aria-labelledby="user-menu-button"
                     tabindex="-1">
                    <a href="{% url 'console:settings:profile' %}"
                       class="block px-3.5 py-2 text-sm leading-6 text-slate-700 hover:bg-slate-50 rounded-lg mx-1"
                       role="menuitem"
                       tabindex="-1" id="user-menu-item-0">{{ member.timezone }}</a>
                    <form id="logout-form" method="post" action="{% url 'console:auth:logout' %}" class="px-1">
                        {% csrf_token %}
                        <button type="submit"
                                class="cursor-pointer block w-full text-left px-2.5 py-2 text-sm leading-6 text-slate-700 hover:bg-slate-50 rounded-lg">
                            Sign out
                        </button>
                    </form>

                </div>
            </div>
        </div>
    </div>
</div>
<script>
    document.addEventListener('alpine:init', () => {
        Alpine.data('headerNav', () => ({
            isOpenMobile: false,

            async signOut() {
                this.loading = true;

                let url = "/logout";

                let response = await fetch(url, {
                    headers: {
                        'Accept': 'application/json',
                        'Content-Type': 'application/json'
                    },
                    method: 'POST'
                }).then(async (response) => {
                    Alpine.store('showLoading').toggle();
                    if (response.ok) {
                        return response.json();
                    }
                }).then((json) => {
                    window.location.href = "/login"
                }).catch((error) => {
                    Alpine.store('notifications').items.push({
                        show: true,
                        error: true,
                        heading: 'Error!',
                        details: error.message
                    });
                });
            },

        }));
    });
</script>
