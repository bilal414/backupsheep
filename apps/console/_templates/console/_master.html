<!DOCTYPE html>
<html lang="en" class="h-full bg-white">
<head>
    <title>{% block title %}Dashboard{% endblock %} · {{ site.app_name }}</title>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <meta name="author" content="{% block author %}MonetizeNow{% endblock %}">
    <!-- Fonts -->
    <link rel="shortcuticon" href="{{ STATIC_URL }}images/favicon.png" type="image/x-icon">
    <link rel="icon" href="{{ STATIC_URL }}images/favicon.png" type="image/x-icon">
    <link type="text/css" href="{{ STATIC_URL }}console/css/compiled.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flowbite@4.0.2/dist/flowbite.min.css"/>
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet"/>
</head>
<body class="h-full{% block page_class %}{% endblock %}">
{% csrf_token %}
<script>
    // Attach Django's CSRF token to every same-origin state-changing fetch() so the
    // session-authenticated API (now CSRF-protected) accepts console requests.
    (function () {
        function getCookie(name) {
            const value = "; " + document.cookie;
            const parts = value.split("; " + name + "=");
            if (parts.length === 2) return parts.pop().split(";").shift();
            return null;
        }
        const unsafe = /^(POST|PUT|PATCH|DELETE)$/i;
        const origFetch = window.fetch;
        window.fetch = function (input, init) {
            init = init || {};
            const method = (init.method || (typeof input !== "string" && input && input.method) || "GET");
            if (unsafe.test(method)) {
                const token = getCookie("csrftoken");
                if (token) {
                    const headers = new Headers(init.headers || (typeof input !== "string" && input && input.headers) || {});
                    if (!headers.has("X-CSRFToken")) headers.set("X-CSRFToken", token);
                    init.headers = headers;
                }
            }
            return origFetch.call(this, input, init);
        };
    })();
</script>
<div x-data="{ sideBar: false }">
    {% include "_sidebar.html" %}
    <div class="lg:pl-72">
        {% include "_header.html" %}
        <main class="py-10  flex flex-col h-screen justify-between">
            <div class="px-4 sm:px-6 lg:px-8 mb-auto">
                {% block content %}{% endblock %}
            </div>
            {% include "_footer.html" %}

        </main>

    </div>
</div>
{% block extra_scripts %}{% endblock %}
<script src="https://cdn.jsdelivr.net/npm/flowbite@4.0.2/dist/flowbite.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.15.12/dist/cdn.min.js"></script>
{% include "_notifications.html" %}
{% include "_loading.html" %}
</body>
</html>
