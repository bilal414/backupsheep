{% extends "console/onboarding/_base.html" %}
{% block step %}
    <h2 class="text-lg font-semibold text-slate-900 mb-2">An administrator already exists</h2>
    <p class="text-sm text-slate-600 mb-5">This install already has an account owner. Sign in to finish setting things up.</p>
    <a href="{% url 'console:auth:login' %}"
       class="inline-block rounded-lg bg-indigo-600 px-5 py-2.5 text-sm font-semibold text-white shadow-sm hover:bg-indigo-500 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-600">Go to sign in</a>
{% endblock %}
