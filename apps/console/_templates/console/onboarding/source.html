{% extends "console/onboarding/_base.html" %}
{% block step %}
    <h2 class="text-lg font-semibold text-slate-900 mb-1">Add your first backup source</h2>
    <p class="text-sm text-slate-500 mb-5">Connect a server, cloud account, database, or website to back up. Opens in a new tab — optional, you can do this anytime.</p>

    <a href="{% url 'console:setup:integration_select' %}" target="_blank" rel="noopener"
       class="inline-flex items-center rounded-lg px-4 py-2.5 text-sm font-semibold text-indigo-700 ring-1 ring-inset ring-indigo-200 hover:bg-indigo-50">
        Browse integrations &rarr;
    </a>

    <div class="flex items-center justify-between mt-8 pt-5 border-t border-slate-100">
        <a href="{% url 'console:onboarding:storage' %}" class="text-sm font-medium text-slate-500 hover:text-slate-700">&larr; Back</a>
        <form method="post" action="{% url 'console:onboarding:finish' %}">
            {% csrf_token %}
            <button type="submit" class="rounded-lg bg-green-600 px-5 py-2.5 text-sm font-semibold text-white shadow-sm hover:bg-green-500 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-green-600">Finish setup &rarr;</button>
        </form>
    </div>
{% endblock %}
