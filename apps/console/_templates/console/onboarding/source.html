{% extends "console/onboarding/_base.html" %}
{% block step %}
    <h2 class="text-lg font-semibold mb-1">Add your first backup source</h2>
    <p class="text-sm text-gray-500 mb-5">Connect a server, cloud account, database, or website to back up. Opens in a new tab — optional, you can do this anytime.</p>

    <a href="{% url 'console:setup:integration_select' %}" target="_blank" rel="noopener"
       class="inline-flex items-center rounded-md ring-1 ring-indigo-200 text-indigo-700 text-sm font-medium px-4 py-2 hover:bg-indigo-50">
        Browse integrations &rarr;
    </a>

    <div class="flex items-center justify-between mt-8 pt-5 border-t border-gray-100">
        <a href="{% url 'console:onboarding:storage' %}" class="text-sm text-gray-500 hover:text-gray-700">&larr; Back</a>
        <form method="post" action="{% url 'console:onboarding:finish' %}">
            {% csrf_token %}
            <button type="submit" class="bg-green-600 text-white text-sm font-medium px-5 py-2 rounded-md hover:bg-green-700">Finish setup &rarr;</button>
        </form>
    </div>
{% endblock %}
