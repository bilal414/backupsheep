# Self-hosted BackupSheep stack: app (web + celery worker + celery beat),
# PostgreSQL, and RabbitMQ (the Celery broker for background and scheduled backups).
#
# The app image builds FROM the `backupsheep-base` image, so build that once first:
#     docker build -f DockerfileBase -t backupsheep-base .
# then:
#     docker compose up --build
#
# Configure .env (see .env_sample). For this stack use the service names below:
#     DB_HOST=db
#     DB_PORT=5432
#     CELERY_BROKER_URL=amqp://guest:guest@rabbitmq:5672//

services:
  db:
    image: postgres:18
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      # postgres:18+ images keep data in a versioned subdir of /var/lib/postgresql
      # and refuse to start when the mount is at the old .../data path.
      - pgdata:/var/lib/postgresql
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    depends_on:
      - db
      - rabbitmq
    ports:
      # nginx (inside the container) serves the app on port 80
      - "8000:80"
    restart: unless-stopped

volumes:
  pgdata:
