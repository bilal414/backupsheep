# Render Blueprint used by the "Deploy to Render" button in README.md.
# BackupSheep needs independent web, worker, and scheduler processes. The worker consumes
# every queue with concurrency 1 because Render services do not share a writable volume.

services:
  - type: web
    name: backupsheep-web
    runtime: docker
    region: oregon
    plan: starter
    numInstances: 1
    autoDeployTrigger: off
    healthCheckPath: /healthz/
    preDeployCommand: python manage.py migrate --noinput
    envVars:
      - fromGroup: backupsheep-common
      - key: ONBOARDING_INSTALL_TOKEN
        sync: false
      - key: APP_DOMAIN
        fromService:
          type: web
          name: backupsheep-web
          envVarKey: RENDER_EXTERNAL_HOSTNAME
      - key: DJANGO_ALLOWED_HOSTS
        fromService:
          type: web
          name: backupsheep-web
          envVarKey: RENDER_EXTERNAL_HOSTNAME
      - key: DATABASE_URL
        fromDatabase:
          name: backupsheep-db
          property: connectionString
      - key: CELERY_BROKER_URL
        value: ""
      - key: RABBITMQ_HOST
        fromService:
          type: pserv
          name: backupsheep-rabbitmq
          property: host
      - key: RABBITMQ_PORT
        value: "5672"
      - key: RABBITMQ_USER
        fromService:
          type: pserv
          name: backupsheep-rabbitmq
          envVarKey: RABBITMQ_DEFAULT_USER
      - key: RABBITMQ_PASSWORD
        fromService:
          type: pserv
          name: backupsheep-rabbitmq
          envVarKey: RABBITMQ_DEFAULT_PASS
      - key: RABBITMQ_VHOST
        fromService:
          type: pserv
          name: backupsheep-rabbitmq
          envVarKey: RABBITMQ_DEFAULT_VHOST

  - type: worker
    name: backupsheep-worker
    runtime: docker
    region: oregon
    plan: starter
    numInstances: 1
    autoDeployTrigger: off
    maxShutdownDelaySeconds: 300
    dockerCommand: >-
      celery -A backupsheep worker --loglevel=info --hostname=backup@%h
      -Q cloud,default,database,files,storage,logs --concurrency=1
    envVars:
      - fromGroup: backupsheep-common
      - key: APP_DOMAIN
        fromService:
          type: web
          name: backupsheep-web
          envVarKey: RENDER_EXTERNAL_HOSTNAME
      - key: DJANGO_ALLOWED_HOSTS
        fromService:
          type: web
          name: backupsheep-web
          envVarKey: RENDER_EXTERNAL_HOSTNAME
      - key: DATABASE_URL
        fromDatabase:
          name: backupsheep-db
          property: connectionString
      - key: CELERY_BROKER_URL
        value: ""
      - key: RABBITMQ_HOST
        fromService:
          type: pserv
          name: backupsheep-rabbitmq
          property: host
      - key: RABBITMQ_PORT
        value: "5672"
      - key: RABBITMQ_USER
        fromService:
          type: pserv
          name: backupsheep-rabbitmq
          envVarKey: RABBITMQ_DEFAULT_USER
      - key: RABBITMQ_PASSWORD
        fromService:
          type: pserv
          name: backupsheep-rabbitmq
          envVarKey: RABBITMQ_DEFAULT_PASS
      - key: RABBITMQ_VHOST
        fromService:
          type: pserv
          name: backupsheep-rabbitmq
          envVarKey: RABBITMQ_DEFAULT_VHOST

  - type: worker
    name: backupsheep-beat
    runtime: docker
    region: oregon
    plan: starter
    numInstances: 1
    autoDeployTrigger: off
    dockerCommand: celery -A backupsheep beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    envVars:
      - fromGroup: backupsheep-common
      - key: APP_DOMAIN
        fromService:
          type: web
          name: backupsheep-web
          envVarKey: RENDER_EXTERNAL_HOSTNAME
      - key: DJANGO_ALLOWED_HOSTS
        fromService:
          type: web
          name: backupsheep-web
          envVarKey: RENDER_EXTERNAL_HOSTNAME
      - key: DATABASE_URL
        fromDatabase:
          name: backupsheep-db
          property: connectionString
      - key: CELERY_BROKER_URL
        value: ""
      - key: RABBITMQ_HOST
        fromService:
          type: pserv
          name: backupsheep-rabbitmq
          property: host
      - key: RABBITMQ_PORT
        value: "5672"
      - key: RABBITMQ_USER
        fromService:
          type: pserv
          name: backupsheep-rabbitmq
          envVarKey: RABBITMQ_DEFAULT_USER
      - key: RABBITMQ_PASSWORD
        fromService:
          type: pserv
          name: backupsheep-rabbitmq
          envVarKey: RABBITMQ_DEFAULT_PASS
      - key: RABBITMQ_VHOST
        fromService:
          type: pserv
          name: backupsheep-rabbitmq
          envVarKey: RABBITMQ_DEFAULT_VHOST

  - type: pserv
    name: backupsheep-rabbitmq
    runtime: image
    region: oregon
    plan: starter
    numInstances: 1
    image:
      url: docker.io/library/rabbitmq:4.3.4-management-alpine
    disk:
      name: rabbitmq-data
      mountPath: /var/lib/rabbitmq
      sizeGB: 1
    envVars:
      - key: RABBITMQ_DEFAULT_USER
        value: backupsheep
      - key: RABBITMQ_DEFAULT_PASS
        generateValue: true
      - key: RABBITMQ_DEFAULT_VHOST
        value: backupsheep

databases:
  - name: backupsheep-db
    databaseName: backupsheep
    user: backupsheep
    region: oregon
    plan: basic-256mb
    postgresMajorVersion: "18"
    # The app uses the private connection string, not public database access.
    ipAllowList: []

envVarGroups:
  - name: backupsheep-common
    envVars:
      - key: DJANGO_SERVER
        value: prod
      - key: DJANGO_DEBUG
        value: "false"
      - key: DJANGO_HTTPS
        value: "true"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: APP_NAME
        value: BackupSheep
      - key: APP_PROTOCOL
        value: "https://"
